name: Base image

# ADR 0001 §5: build and publish the freely available, versioned, cell-agnostic
# base image on tagged releases. The image tag mirrors the git tag verbatim
# (v-prefixed), so a given `datamk` deploys the matching
# `ghcr.io/scalecraft-dev/datamk:vX.Y.Z` (see KubernetesConfig::image_ref).
#
# Multi-arch: each platform builds NATIVELY on its own runner (no QEMU — the
# bundled DuckDB compile under emulation takes hours), pushed by digest; the
# `merge` job stitches the digests into one manifest per tag. Each platform
# keeps its own registry build cache, so post-seed releases are minutes.
#
# NOTE: `ubuntu-24.04-arm` hosted runners are free for PUBLIC repos. For a
# private repo, either configure a paid arm64 larger runner in the org
# settings and put its label below, or drop the arm64 matrix entry to ship
# amd64-only.
on:
  push:
    tags: ["v*"]
  # Manual run: builds and refreshes the per-arch :buildcache-* layers WITHOUT
  # publishing a version — use it to pre-warm the dependency caches so the next
  # `make release` is minutes, not a from-scratch DuckDB compile.
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/scalecraft-dev/datamk

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            # amd64 reads the pre-split ":buildcache" seed once, then lives at
            # its own suffix. Cheap to keep both after migration.
            cache_from: |
              type=registry,ref=ghcr.io/scalecraft-dev/datamk:buildcache-amd64
              type=registry,ref=ghcr.io/scalecraft-dev/datamk:buildcache
            cache_to: type=registry,ref=ghcr.io/scalecraft-dev/datamk:buildcache-amd64,mode=max
          - platform: linux/arm64
            runner: ubuntu-24.04-arm # PRIVATE repo? see NOTE above
            cache_from: type=registry,ref=ghcr.io/scalecraft-dev/datamk:buildcache-arm64
            cache_to: type=registry,ref=ghcr.io/scalecraft-dev/datamk:buildcache-arm64,mode=max
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/')
        # The binary in this image reports CARGO_PKG_VERSION (bare semver), and
        # the Kubernetes target's default image is
        # ghcr.io/scalecraft-dev/datamk:v<that version> (ADR 0001 §5) — a tag
        # that doesn't match the stamped Cargo.toml would publish an image
        # whose own binary points deploys at a different image. `make release`
        # stamps this correctly; this guards hand-pushed tags. Checked here,
        # per-platform, so a bad tag fails before an hour of compiling.
        run: |
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "v${cargo_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}." >&2
            echo "Cut releases with: make release VERSION=${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (push by digest on tag runs)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Tag runs push an untagged image by digest for the merge job; a
          # workflow_dispatch run only builds + refreshes the build cache.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=${{ startsWith(github.ref, 'refs/tags/') }}
          cache-from: ${{ matrix.cache_from }}
          cache-to: ${{ matrix.cache_to }}

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push the manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:${GITHUB_REF_NAME}" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "$IMAGE:${GITHUB_REF_NAME}"
