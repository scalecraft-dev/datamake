[package]
name = "datamk"
version = "0.0.0"
edition = "2021"
description = "the cell — reduce time to value for data"
license = "Apache-2.0"

[[bin]]
name = "datamk"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }   # preserves declared column order
anyhow = "1"
thiserror = "1"
semver = "1"
duckdb = { version = "1", features = ["bundled"] }    # compiles DuckDB; heavy first build
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal"] }
axum = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
