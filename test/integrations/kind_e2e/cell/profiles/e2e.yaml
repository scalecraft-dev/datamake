# e2e profile: in-cluster MinIO storage and NO `catalog:` — published-artifact
# mode (ADR 0004): the catalog derives from `storage`, executions publish
# immutable artifacts, and the object store is the cell's ONLY external
# dependency. Committed here (not gitignored) because it carries no real
# secrets — MinIO's dev-mode creds default to `minioadmin`/`minioadmin` and are
# only ever reachable from inside the `datamk-e2e` namespace.
#
# `orders` is anonymous (no `access.roles`), so there's no `principals:` here —
# see cell.yaml.
storage: s3://datamk-e2e/cells/orders
s3:
  region: us-east-1
  # NOTE: no scheme here. DuckDB's S3 secret `ENDPOINT` is a bare host[:port] —
  # `use_ssl` is what controls http vs https, not a URL prefix on `endpoint`.
  # DuckDB builds the actual request URL as `http(s)://` + ENDPOINT + path, so
  # an `endpoint: http://host:port` (as first sketched here) produces a
  # doubled `http://http://host:port/...` that fails to resolve as a hostname.
  # Confirmed by actually PUTting to MinIO both ways — see the e2e README's
  # "bugs hit" section for the exact error and the reproduction.
  endpoint: minio.datamk-e2e.svc.cluster.local:9000
  url_style: path
  use_ssl: false
  key_id: ${DATAMK_E2E_S3_KEY:-minioadmin}
  secret: ${DATAMK_E2E_S3_SECRET:-minioadmin}
