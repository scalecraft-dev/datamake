# Deploy topology for the `prod` profile. Tracked, secret-free.
target: kubernetes

# Open endpoint (cell is shareable with no roles): this is the deliberate,
# reviewed acknowledgement the open-endpoint pre-flight (§8f) requires.
allow_anonymous: true

