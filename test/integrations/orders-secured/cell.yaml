cell: orders_secured

transforms:
  - sql/stg_orders.sql
  - sql/orders_daily.sql

interface:
  - name: orders_daily
    version: 2.1.0
    source: orders_daily
    grain: [order_date, region]
    schema:
      order_date: date
      region: string
      revenue: decimal
    visibility: discoverable
    contract: experimental

access:
  shareable: true
  roles: [analyst]             # role-gated: serve requires a bearer token mapped to `analyst`
